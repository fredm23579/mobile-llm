name: CMake Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake gfortran libeigen3-dev

    - name: Install LibTorch
      run: |
        pip install torch --index-url https://download.pytorch.org/whl/cpu
        echo "TORCH_PATH=$(python -c 'import torch; print(torch.__path__[0])')/share/cmake/Torch" >> $GITHUB_ENV

    - name: Configure CMake
      run: cmake -DCMAKE_PREFIX_PATH=${{ env.TORCH_PATH }} .

    - name: Build
      run: make

    - name: Run Tests
      run: ./mobile_llm_tests
